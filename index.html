<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Verb Quiz ✨</title>
    <style>
        :root {
            --bg-color: #f5f3ff;
            --card-bg: #ffffff;
            --primary: #a78bfa;
            --text-main: #4c1d95;
            --correct-text: #059669;
            --incorrect-text: #e11d48;
        }

        body { font-family: 'Nunito', sans-serif; background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .quiz-card { background-color: var(--card-bg); padding: 35px 25px; border-radius: 32px; box-shadow: 0 20px 40px -15px rgba(167, 139, 250, 0.15); text-align: center; width: 100%; max-width: 400px; border: 4px solid #f3e8ff; }
        .emoji-display { font-size: 64px; margin-bottom: 10px; }
        .word-display { font-size: 32px; font-weight: 800; margin-bottom: 25px; }
        input[type="text"] { width: 100%; padding: 16px; font-size: 18px; border: 3px solid #f3e8ff; border-radius: 20px; text-align: center; box-sizing: border-box; }
        
        .button-group { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        button { width: 100%; border: none; padding: 16px; font-size: 16px; font-weight: 700; border-radius: 20px; cursor: pointer; color: white; }
        
        .btn-check { background: linear-gradient(135deg, #c084fc, #a78bfa); }
        .btn-answer { background: #cbd5e1; }
        .btn-next { background: #818cf8; display: none; } /* 最初は非表示 */
        
        .result-area { margin-top: 20px; min-height: 85px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .correct-answer { font-size: 20pt; color: #e11d48; font-weight: 800; margin-top: 8px; }
        .feedback { font-size: 18px; font-weight: 800; }
    </style>
</head>
<body>

<div class="quiz-card">
    <div class="instruction">🎮Type the te-form in hiragana ✨</div>
<div id="emojiDisplay" class="emoji-display">⏰</div>
<div id="wordDisplay" class="word-display">---</div>
<div id="meaningDisplay" style="font-size: 18px; color: #7c3aed; margin-bottom: 20px;">---</div>
    
    <form id="quizForm" onsubmit="checkAnswer(event)">
        <input type="text" id="userInput" placeholder="Type here... 🌸" autocomplete="off" required>
        <div class="button-group">
            <button type="submit" class="btn-check" id="checkBtn">Check! 👉</button>
            <button type="button" class="btn-answer" id="answerBtn" onclick="showAnswer()">Answer! 👉</button>
            <button type="button" class="btn-next" id="nextBtn" onclick="nextQuestion()">Next Question 👉</button>
        </div>
    </form>
    
    <div class="result-area" id="resultArea"></div>
    
    <div class="score-board">
        <span>Ganbatte! 🎀</span>
        <span id="scoreDisplay">Score: 0 / 0</span>
    </div>
</div>


<script>
const quizData = [
        { word: "work", answer: "はたらいて", ja: "はたらきます", emoji: "💼" },
        { word: "write, draw, paint", answer: "かいて", ja: "かきます", emoji: "✏️" },
        { word: "hear, listen", answer: "きいて", ja: "ききます", emoji: "🎧" },
        { word: "go", answer: "いって", ja: "いきます", emoji: "🚶" },
        { word: "swim", answer: "およいで", ja: "およぎます", emoji: "🏊" },
        { word: "hurry", answer: "いそいで", ja: "いそぎます", emoji: "🏃" },
        { word: "drink", answer: "のんで", ja: "のみます", emoji: "🍹" },
        { word: "read", answer: "よんで", ja: "よみます", emoji: "📚" },
        { word: "play, hang out", answer: "あそんで", ja: "あそびます", emoji: "🎈" },
        { word: "call", answer: "よんで", ja: "よびます", emoji: "🗣️" },
        { word: "meet, see [a friend]", answer: "あって", ja: "あいます", emoji: "🤝" },
        { word: "buy", answer: "かって", ja: "かいます", emoji: "🛍️" },
        { word: "receive", answer: "もらって", ja: "もらいます", emoji: "🎁" },
        { word: "receive (formal)", answer: "うけとって", ja: "うけとります", emoji: "📦" },
        { word: "help, assist", answer: "てつだって", ja: "てつだいます", emoji: "🤝" },
        { word: "wait", answer: "まって", ja: "まちます", emoji: "⏳" },
        { word: "hold / have", answer: "もって", ja: "もちます", emoji: "🎒" },
        { word: "enter", answer: "はいって", ja: "はいります", emoji: "🚪" },
        { word: "take, pass", answer: "とって", ja: "とります", emoji: "📸" },
        { word: "turn", answer: "まがって", ja: "まがります", emoji: "🪧" },
        { word: "rain", answer: "あめがふって", ja: "あめがふります", emoji: "☔" },
        { word: "send", answer: "おくって", ja: "おくります", emoji: "✉️" },
        { word: "speak, talk", answer: "はなして", ja: "はなします", emoji: "💬" },
        { word: "turn off", answer: "けして", ja: "けします", emoji: "🔌" },
        { word: "sleep", answer: "ねて", ja: "ねます", emoji: "🛌" },
        { word: "eat", answer: "たべて", ja: "たべます", emoji: "🍰" },
        { word: "go out of", answer: "でて", ja: "でます", emoji: "🏃" },
        { word: "show", answer: "みせて", ja: "みせます", emoji: "👀" },
        { word: "stop", answer: "やめて", ja: "やめます", emoji: "🛑" },
        { word: "open", answer: "あけて", ja: "あけます", emoji: "🔓" },
        { word: "turn on", answer: "つけて", ja: "つけます", emoji: "💡" },
        { word: "tell", answer: "おしえて", ja: "おしえます", emoji: "🧑‍🏫" },
        { word: "close, shut", answer: "しめて", ja: "しめます", emoji: "🚪" },
        { word: "see, look at, watch", answer: "みて", ja: "みます", emoji: "📺" },
        { word: "stay (I'm in)", answer: "いて", ja: "います", emoji: "🏠" },
        { word: "wake up", answer: "おきて", ja: "おきます", emoji: "⏰" },
        { word: "study", answer: "べんきょうして", ja: "べんきょうします", emoji: "✍️" },
        { word: "take a walk", answer: "さんぽして", ja: "さんぽします", emoji: "🐕" },
        { word: "have a meal", answer: "しょくじして", ja: "しょくじします", emoji: "🍽️" },
        { word: "do shopping", answer: "かいものして", ja: "かいものします", emoji: "🛒" },
        { word: "marry", answer: "けっこんして", ja: "けっこんします", emoji: "💍" },
        { word: "copy", answer: "コピーして", ja: "コピーします", emoji: "📄" },
        { word: "play tennis", answer: "テニスして", ja: "テニスします", emoji: "🎾" },
        { word: "exercise", answer: "うんどうして", ja: "うんどうします", emoji: "🏋️‍♀️" },
        { word: "play a game", answer: "ゲームして", ja: "ゲームします", emoji: "🎮" },
        { word: "come", answer: "きて", ja: "きます", emoji: "🫴" }
    ];

    let currentIndex = Math.floor(Math.random() * quizData.length);
    let score = 0;
    let total = 0;

// 修正1: 関数を統一し、ます形を表示するように修正
    function showQuestion() {
        const item = quizData[currentIndex];
        document.getElementById('emojiDisplay').textContent = item.emoji;
        document.getElementById('wordDisplay').textContent = item.word;
        
        // ます形を表示するIDを追加
        document.getElementById('meaningDisplay').textContent = item.ja;
        
        document.getElementById('resultArea').innerHTML = "";
        document.getElementById('userInput').value = "";
        
        document.getElementById('checkBtn').style.display = 'block';
        document.getElementById('answerBtn').style.display = 'block';
        document.getElementById('nextBtn').style.display = 'none';
    }


        
    function showAnswer() {
        document.getElementById('resultArea').innerHTML = `<div class='correct-answer'>${quizData[currentIndex].answer}</div>`;
        toggleButtons();
    }

function checkAnswer(event) {
        event.preventDefault();
        const userInput = document.getElementById('userInput').value.trim();
        const correctAnswer = quizData[currentIndex].answer;
        const resultArea = document.getElementById('resultArea');
        
        // スコア計算のロジック
        total++;
        if (userInput === correctAnswer) {
            score++;
            resultArea.innerHTML = "<div class='feedback' style='color:#F172A3;'>🎉 Correct!</div>";
        } else {
            resultArea.innerHTML = `<div class='feedback' style='color:#F172A3;'>ぴえん 😭 Wrong</div>
                                    <div class='correct-answer'>${correctAnswer}</div>`;
        }

        // スコア表示の更新（ここが抜けていました）
        document.getElementById('scoreDisplay').textContent = `Score: ${score} / ${total}`;
        
        toggleButtons();
    }

    // ボタンの表示を切り替える関数
    function toggleButtons() {
        document.getElementById('checkBtn').style.display = 'none';
        document.getElementById('answerBtn').style.display = 'none';
        document.getElementById('nextBtn').style.display = 'block';
    }

// 配列の先頭で history を定義しておきます
let history = [];
const HISTORY_LIMIT = 5; // 直近何問の重複を防ぐか（例：5問）

function nextQuestion() {
    let nextIndex;
    
    // 重複しない、かつ履歴に含まれないものを探す
    do {
        nextIndex = Math.floor(Math.random() * quizData.length);
    } while (history.includes(nextIndex)); // 履歴にあれば選び直す

    // 履歴を更新
    history.push(nextIndex);
    if (history.length > HISTORY_LIMIT) {
        history.shift(); // 古いものから削除
    }
    
    currentIndex = nextIndex;
    showQuestion();
}

// ページ読み込み時に最初の問題を表示する処理を追加！
showQuestion();

</script>

</body>
</html>
